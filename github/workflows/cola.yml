name: Native-macOS-VNC

on:
  workflow_dispatch:

jobs:
  macos-setup:
    runs-on: macos-latest # Yahan hum direct original macOS use kar rahe hain
    steps:
      - name: Enable macOS VNC (Screen Sharing) & Set Passwords
        run: |
          echo "Setting up VNC Server..."
          # Default user 'runner' ka password set kar rahe hain
          sudo dscl . -passwd /Users/runner "Admin@123"
          
          # macOS ka inbuilt VNC server start karna aur password set karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -clientopts -setvncpw -vncpw "Admin@123" -restart -agent -privs -all
          echo "✅ VNC Server Started Successfully."

      - name: Install and Start Ngrok
        run: |
          echo "Installing Ngrok via Homebrew..."
          brew install ngrok/ngrok/ngrok
          
          # Aapka direct token
          ngrok config add-authtoken 3BM6N01n6rva49E8A9dCmdkFQ9O_5K2ifGy74gi8TaAQ28wx8
          
          # Port 5900 (VNC) ko tunnel karna
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10
          
          echo "=========================================="
          echo "🚀 NATIVE MACOS READY TO CONNECT"
          echo "=========================================="
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "Is URL ko RealVNC mein dalo (shuru ka tcp:// hata dena)."
          echo "Password for VNC: Admin@123"
          echo "=========================================="

      - name: Keep Alive Loop
        run: |
          # Session ko active rakhne ke liye (GitHub Actions max 6 ghante chalta hai)
          sleep 21600 
